<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FoldQuest — Aprenda AlphaFold</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-soft: #161b22;
    --bg-card: #1c2230;
    --border: #2b3242;
    --text: #e6edf3;
    --text-dim: #9aa7b8;
    --accent: #4f8cff;
    --accent-2: #7c5cff;
    --good: #3fb950;
    --bad: #f85149;
    --warn: #d29922;
    --gold: #e3b341;
    --radius: 14px;
    --shadow: 0 8px 30px rgba(0,0,0,.35);
  }
  [data-theme="light"] {
    --bg: #f4f6fb;
    --bg-soft: #ffffff;
    --bg-card: #ffffff;
    --border: #dce1ea;
    --text: #1a2030;
    --text-dim: #5a6678;
    --shadow: 0 8px 30px rgba(40,60,100,.10);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); }
  button { font-family: inherit; cursor: pointer; }
  .wrap { max-width: 880px; margin: 0 auto; padding: 0 16px 80px; }

  /* Top bar */
  header.bar {
    position: sticky; top: 0; z-index: 50;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .bar-inner {
    max-width: 880px; margin: 0 auto; padding: 10px 16px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .logo { font-weight: 800; font-size: 18px; letter-spacing: .3px; display: flex; align-items: center; gap: 8px; }
  .logo .dot { width: 12px; height: 12px; border-radius: 4px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
  .spacer { flex: 1; }
  .stat { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-dim); font-weight: 600; }
  .stat b { color: var(--text); }
  .pill {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 999px; padding: 5px 12px; font-size: 13px; font-weight: 700;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .icon-btn {
    background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
    border-radius: 10px; padding: 7px 10px; font-size: 14px;
  }

  /* XP bar */
  .xpbar { height: 6px; background: var(--border); border-radius: 999px; overflow: hidden; }
  .xpbar > div { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .5s ease; }

  /* Hero */
  .hero { padding: 28px 0 6px; }
  .hero h1 { font-size: 30px; margin: 0 0 6px; }
  .hero p { color: var(--text-dim); margin: 0; }

  /* Cards / modules */
  .grid { display: grid; gap: 16px; margin-top: 20px; }
  .module {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 18px; box-shadow: var(--shadow);
    position: relative; overflow: hidden;
  }
  .module.locked { opacity: .55; }
  .module .m-head { display: flex; align-items: center; gap: 12px; }
  .m-num {
    width: 40px; height: 40px; border-radius: 12px; flex: 0 0 auto;
    display: grid; place-items: center; font-weight: 800; font-size: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff;
  }
  .module.locked .m-num { background: var(--border); color: var(--text-dim); }
  .m-title { font-weight: 700; font-size: 17px; margin: 0; }
  .m-sub { color: var(--text-dim); font-size: 13px; margin: 2px 0 0; }
  .m-prog { margin-top: 14px; }
  .m-prog .xpbar { margin-top: 6px; }
  .m-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-dim); }
  .badge-soon { position: absolute; top: 14px; right: 14px; font-size: 11px; color: var(--text-dim);
    border: 1px solid var(--border); border-radius: 999px; padding: 2px 9px; }
  .btn {
    border: none; border-radius: 10px; padding: 10px 18px; font-weight: 700; font-size: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff;
  }
  .btn.ghost { background: var(--bg-soft); color: var(--text); border: 1px solid var(--border); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }

  /* Review banner */
  .review-banner {
    background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 22%, var(--bg-card)), var(--bg-card));
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 18px; display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow);
  }
  .review-banner .big { font-size: 26px; font-weight: 800; }

  /* Lesson / exercise view */
  .panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 22px; box-shadow: var(--shadow); }
  .crumbs { font-size: 13px; color: var(--text-dim); margin: 18px 0 12px; display: flex; align-items: center; gap: 8px; }
  .crumbs a { cursor: pointer; }
  .lesson h2 { margin-top: 0; }
  .lesson h3 { margin: 22px 0 8px; font-size: 18px; }
  .lesson p { color: var(--text); }
  .lesson ul { padding-left: 20px; }
  .lesson li { margin: 4px 0; }
  .analogy {
    border-left: 3px solid var(--accent-2); background: var(--bg-soft);
    padding: 10px 14px; border-radius: 8px; margin: 14px 0; font-size: 14px;
  }
  .analogy b { color: var(--accent-2); }
  .keyword { color: var(--accent); font-weight: 600; }
  .figure { margin: 18px 0; text-align: center; }
  .figure svg { max-width: 100%; height: auto; }
  .figcap { font-size: 12px; color: var(--text-dim); margin-top: 6px; }

  /* progress dots within a module run */
  .runbar { display: flex; gap: 6px; margin: 16px 0 20px; }
  .runbar .seg { height: 6px; flex: 1; border-radius: 999px; background: var(--border); }
  .runbar .seg.done { background: var(--good); }
  .runbar .seg.cur { background: var(--accent); }

  /* Quiz */
  .q-text { font-size: 18px; font-weight: 600; margin: 4px 0 18px; }
  .opt {
    display: block; width: 100%; text-align: left; margin: 8px 0; padding: 13px 15px;
    background: var(--bg-soft); border: 1.5px solid var(--border); border-radius: 12px;
    color: var(--text); font-size: 15px; transition: .15s;
  }
  .opt:hover:not(:disabled) { border-color: var(--accent); }
  .opt.correct { border-color: var(--good); background: color-mix(in srgb, var(--good) 15%, var(--bg-soft)); }
  .opt.wrong { border-color: var(--bad); background: color-mix(in srgb, var(--bad) 15%, var(--bg-soft)); }
  .feedback { margin-top: 16px; padding: 14px; border-radius: 12px; font-size: 14px; display: none; }
  .feedback.show { display: block; }
  .feedback.ok { background: color-mix(in srgb, var(--good) 14%, var(--bg-card)); border: 1px solid var(--good); }
  .feedback.no { background: color-mix(in srgb, var(--bad) 14%, var(--bg-card)); border: 1px solid var(--bad); }
  .feedback b { display: block; margin-bottom: 4px; }

  /* Fill blank */
  .fill input {
    background: var(--bg-soft); border: 1.5px solid var(--border); color: var(--text);
    border-radius: 10px; padding: 11px 14px; font-size: 16px; width: 100%; margin: 6px 0 4px;
  }
  .fill input:focus { outline: none; border-color: var(--accent); }
  .hint { font-size: 12px; color: var(--text-dim); }

  /* Order / drag */
  .order-list { list-style: none; padding: 0; margin: 10px 0; }
  .order-item {
    background: var(--bg-soft); border: 1.5px solid var(--border); border-radius: 10px;
    padding: 12px 14px; margin: 8px 0; display: flex; align-items: center; gap: 12px; cursor: grab;
    user-select: none;
  }
  .order-item.dragging { opacity: .4; }
  .order-item .grip { color: var(--text-dim); font-size: 18px; }
  .order-item .num { width: 24px; height: 24px; border-radius: 7px; background: var(--bg-card);
    display: grid; place-items: center; font-size: 12px; font-weight: 700; color: var(--text-dim); }

  /* Elaboration */
  textarea.elab {
    width: 100%; min-height: 110px; background: var(--bg-soft); border: 1.5px solid var(--border);
    color: var(--text); border-radius: 12px; padding: 13px; font-size: 15px; font-family: inherit; resize: vertical;
  }
  textarea.elab:focus { outline: none; border-color: var(--accent); }
  .model-answer { margin-top: 14px; background: var(--bg-soft); border: 1px dashed var(--border);
    border-radius: 12px; padding: 14px; font-size: 14px; }

  /* Flashcard */
  .flash {
    perspective: 1200px; height: 230px; margin: 10px 0 4px;
  }
  .flash-inner { position: relative; width: 100%; height: 100%; transition: transform .5s; transform-style: preserve-3d; }
  .flash.flipped .flash-inner { transform: rotateY(180deg); }
  .flash-face {
    position: absolute; inset: 0; backface-visibility: hidden; border-radius: var(--radius);
    border: 1.5px solid var(--border); background: var(--bg-soft); padding: 22px;
    display: grid; place-items: center; text-align: center; font-size: 18px;
  }
  .flash-face.back { transform: rotateY(180deg); background: var(--bg-card); }
  .flash-face .tag { position: absolute; top: 12px; left: 14px; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .08em; }
  .srs-row { display: flex; gap: 8px; margin-top: 12px; }
  .srs-row .btn { flex: 1; }
  .srs-again { background: var(--bad) !important; }
  .srs-hard { background: var(--warn) !important; }
  .srs-good { background: var(--good) !important; }
  .srs-easy { background: var(--accent) !important; }

  /* Diagram (interactive Evoformer/pipeline) */
  .diagram { display: grid; gap: 10px; margin: 16px 0; }
  .diag-node {
    background: var(--bg-soft); border: 1.5px solid var(--border); border-radius: 12px;
    padding: 12px 14px; cursor: pointer; transition: .15s;
  }
  .diag-node:hover { border-color: var(--accent); }
  .diag-node.active { border-color: var(--accent-2); background: color-mix(in srgb, var(--accent-2) 12%, var(--bg-soft)); }
  .diag-node h4 { margin: 0; font-size: 15px; }
  .diag-node .desc { font-size: 13px; color: var(--text-dim); margin-top: 6px; display: none; }
  .diag-node.active .desc { display: block; }
  .diag-arrow { text-align: center; color: var(--text-dim); font-size: 18px; }

  /* pLDDT interactive */
  .plddt-demo { margin: 16px 0; }
  .plddt-track { display: flex; height: 34px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .plddt-seg { flex: 1; cursor: pointer; transition: opacity .15s; }
  .plddt-seg:hover { opacity: .8; }
  .plddt-legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 12px; margin-top: 10px; color: var(--text-dim); }
  .plddt-legend span { display: inline-flex; align-items: center; gap: 5px; }
  .plddt-legend i { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
  .plddt-readout { margin-top: 10px; font-size: 14px; min-height: 22px; }

  /* Completion */
  .done-screen { text-align: center; padding: 30px 0; }
  .done-screen .trophy { font-size: 64px; }
  .done-screen h2 { margin: 8px 0; }
  .xp-pop { color: var(--gold); font-weight: 800; font-size: 22px; }

  /* Badges */
  .badges { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
  .badge {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 12px; font-size: 13px; display: flex; align-items: center; gap: 8px; min-width: 0;
  }
  .badge.locked { opacity: .4; }
  .badge .ico { font-size: 20px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 18px; box-shadow: var(--shadow); font-weight: 700; opacity: 0;
    transition: .3s; z-index: 100; display: flex; align-items: center; gap: 8px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .footnote { color: var(--text-dim); font-size: 12px; margin-top: 26px; text-align: center; }
  .section-title { font-size: 14px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); margin: 28px 0 6px; }

  @media (max-width: 560px) {
    .hero h1 { font-size: 24px; }
    .bar-inner { gap: 8px; }
    .stat.hide-sm { display: none; }
  }
</style>
</head>
<body>
<header class="bar">
  <div class="bar-inner">
    <div class="logo"><span class="dot"></span> FoldQuest</div>
    <div class="spacer"></div>
    <div class="stat hide-sm">🔥 <b id="s-streak">0</b></div>
    <div class="pill" id="s-level">Nv 1</div>
    <div class="stat">⭐ <b id="s-xp">0</b> XP</div>
    <button class="icon-btn" id="theme-btn" title="Tema">🌙</button>
  </div>
</header>

<div class="wrap" id="app"></div>

<div class="toast" id="toast"></div>

<script>
/* =========================================================================
   FoldQuest — app de aprendizagem gamificado sobre AlphaFold
   Single-file, vanilla JS, sem dependências, persiste em localStorage.
   Técnicas: recordação ativa, repetição espaçada (SM-2), efeito de teste com
   feedback explicativo, interleaving na revisão, scaffolding (módulos travados),
   elaboração. Gamificação: XP, níveis, streak, badges.
   ========================================================================= */

/* ----------------------------- CONTEÚDO ---------------------------------- */
/* Cada módulo tem "items": passos sequenciais. Tipos de item:
   lesson | quiz | fill | order | elaborate | flashcard | diagram | plddt
   Itens que geram cards de repetição espaçada têm um campo "srs" com {front,back}.
*/

const MODULES = [
  {
    id: "fundamentos",
    title: "Fundamentos Biológicos",
    sub: "Proteínas, aminoácidos e por que a forma define a função",
    items: [
      {
        type: "lesson",
        title: "O que é uma proteína?",
        html: `
          <p>Proteínas são as <span class="keyword">máquinas moleculares</span> da vida. Elas
          digerem alimentos, transportam oxigênio, combatem infecções, copiam seu DNA e dão
          estrutura aos seus tecidos. Quase tudo que acontece numa célula é feito por proteínas.</p>
          <p>Cada proteína é uma cadeia de blocos menores chamados <span class="keyword">aminoácidos</span>.
          Existem 20 tipos de aminoácidos. A ordem em que eles aparecem na cadeia é a
          <span class="keyword">sequência</span> da proteína — também chamada de <b>estrutura primária</b>.</p>
          <div class="figure">
          <svg viewBox="0 0 480 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sequência de aminoácidos que se dobra numa forma 3D">
            <line x1="24" y1="55" x2="189" y2="55" stroke="var(--border)" stroke-width="4"/>
            <circle cx="24"  cy="55" r="13" fill="#4f8cff"/>
            <circle cx="57"  cy="55" r="13" fill="#7c5cff"/>
            <circle cx="90"  cy="55" r="13" fill="#3fb950"/>
            <circle cx="123" cy="55" r="13" fill="#e3b341"/>
            <circle cx="156" cy="55" r="13" fill="#f85149"/>
            <circle cx="189" cy="55" r="13" fill="#4f8cff"/>
            <text x="106" y="100" text-anchor="middle" font-size="12" fill="var(--text-dim)">sequência (estrutura primária)</text>
            <text x="240" y="62" text-anchor="middle" font-size="26" fill="var(--text-dim)">→</text>
            <path d="M300,55 q15,-38 35,-13 q20,25 0,40 q-18,14 5,30 q22,15 40,-10 q12,-20 32,-7"
                  fill="none" stroke="var(--accent-2)" stroke-width="4" stroke-linecap="round"/>
            <circle cx="300" cy="55" r="7" fill="#4f8cff"/>
            <circle cx="412" cy="55" r="7" fill="#4f8cff"/>
            <text x="372" y="140" text-anchor="middle" font-size="12" fill="var(--text-dim)">forma 3D (enovelada)</text>
          </svg>
          <div class="figcap">A mesma cadeia de aminoácidos se dobra espontaneamente numa forma 3D específica.</div>
          </div>
          <div class="analogy"><b>Analogia:</b> pense nos 20 aminoácidos como um alfabeto de 20 letras.
          Uma proteína é uma "palavra" muito longa escrita com esse alfabeto. A sequência é o gene
          traduzido em letras.</div>
        `
      },
      {
        type: "quiz",
        q: "Quantos tipos de aminoácidos formam as proteínas?",
        options: ["4", "20", "64", "Centenas"],
        answer: 1,
        why: "São 20 aminoácidos padrão. (4 é o número de bases do DNA; 64 é o número de códons; centenas não está correto.)"
      },
      {
        type: "lesson",
        title: "Da sequência à forma 3D",
        html: `
          <p>A sequência (estrutura primária) não fica esticada como um colar. A cadeia
          <span class="keyword">se dobra (enovela)</span> espontaneamente numa forma 3D específica.
          Subimos por níveis:</p>
          <ul>
            <li><b>Primária:</b> a sequência de aminoácidos.</li>
            <li><b>Secundária:</b> padrões locais repetidos — <span class="keyword">hélices-α</span>
              (espirais) e <span class="keyword">folhas-β</span> (fitas lado a lado).</li>
            <li><b>Terciária:</b> a forma 3D completa de uma única cadeia.</li>
            <li><b>Quaternária:</b> várias cadeias juntas formando um complexo (ex.: a hemoglobina tem 4).</li>
          </ul>
          <div class="figure">
          <svg viewBox="0 0 540 165" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Os quatro níveis de estrutura de uma proteína">
            <line x1="135" y1="20" x2="135" y2="108" stroke="var(--border)" stroke-width="1" stroke-dasharray="3 4"/>
            <line x1="270" y1="20" x2="270" y2="108" stroke="var(--border)" stroke-width="1" stroke-dasharray="3 4"/>
            <line x1="405" y1="20" x2="405" y2="108" stroke="var(--border)" stroke-width="1" stroke-dasharray="3 4"/>
            <!-- 1 Primária -->
            <line x1="35" y1="60" x2="101" y2="60" stroke="var(--border)" stroke-width="3"/>
            <circle cx="35" cy="60" r="9" fill="#4f8cff"/><circle cx="57" cy="60" r="9" fill="#7c5cff"/>
            <circle cx="79" cy="60" r="9" fill="#3fb950"/><circle cx="101" cy="60" r="9" fill="#e3b341"/>
            <text x="67" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="var(--text-dim)">Primária</text>
            <text x="67" y="144" text-anchor="middle" font-size="10" fill="var(--text-dim)">sequência</text>
            <!-- 2 Secundária: hélice + folha -->
            <path d="M165,30 c22,6 22,22 0,28 c-22,6 -22,22 0,28" fill="none" stroke="#3fb950" stroke-width="4" stroke-linecap="round"/>
            <g stroke="#e3b341" stroke-width="4" fill="none" stroke-linecap="round">
              <path d="M212,32 l0,46"/><path d="M228,32 l0,46"/>
              <path d="M207,74 l5,8 l5,-8"/><path d="M223,74 l5,8 l5,-8"/>
            </g>
            <text x="202" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="var(--text-dim)">Secundária</text>
            <text x="202" y="144" text-anchor="middle" font-size="10" fill="var(--text-dim)">hélices e folhas</text>
            <!-- 3 Terciária -->
            <path d="M302,52 q15,-28 30,-9 q14,20 -1,34 q-15,12 8,25 q20,10 33,-12"
                  fill="none" stroke="#4f8cff" stroke-width="4" stroke-linecap="round"/>
            <text x="337" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="var(--text-dim)">Terciária</text>
            <text x="337" y="144" text-anchor="middle" font-size="10" fill="var(--text-dim)">forma 3D da cadeia</text>
            <!-- 4 Quaternária -->
            <g fill="none" stroke-width="3.5" stroke-linecap="round">
              <path d="M435,46 q12,-18 24,-4 q10,16 -4,26" stroke="#4f8cff"/>
              <path d="M462,42 q14,-13 24,2 q8,16 -6,24" stroke="#7c5cff"/>
              <path d="M446,72 q12,-12 26,0 q10,14 -4,22" stroke="#3fb950"/>
            </g>
            <text x="472" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="var(--text-dim)">Quaternária</text>
            <text x="472" y="144" text-anchor="middle" font-size="10" fill="var(--text-dim)">várias cadeias</text>
          </svg>
          <div class="figcap">A complexidade sobe do local (sequência) ao global (conjunto de cadeias).</div>
          </div>
          <div class="analogy"><b>Analogia:</b> a primária é a letra da música escrita; a secundária são
          os refrões e estrofes recorrentes; a terciária é a música inteira tocada; a quaternária é
          a banda inteira tocando junto.</div>
        `
      },
      {
        type: "order",
        q: "Sem usar os nomes: ordene estas descrições, da estrutura mais simples à mais complexa:",
        items: ["A sequência linear de aminoácidos, como contas num colar", "Hélices em espiral e folhas feitas de fitas lado a lado", "Uma única cadeia totalmente dobrada na sua forma 3D", "Duas ou mais cadeias unidas num mesmo complexo"],
        why: "Da mais simples à mais complexa: sequência = primária → padrões locais (hélices/folhas) = secundária → cadeia inteira dobrada = terciária → várias cadeias juntas = quaternária."
      },
      {
        type: "lesson",
        title: "A regra de ouro: forma = função",
        html: `
          <p>Aqui está a ideia central de toda a biologia estrutural:</p>
          <p style="font-size:18px"><b>A forma 3D de uma proteína determina o que ela faz.</b></p>
          <div class="figure">

/* ----------------------------- ESTADO ------------------------------------ */
const LS_KEY = "foldquest_v1";
const todayStr = () => new Date().toISOString().slice(0, 10);

const defaultState = () => ({
  xp: 0,
  streak: 0,
  lastActive: null,
  completed: {},          // moduleId -> array de índices de itens concluídos
  badges: [],
  srs: {},                // cardId -> { ef, reps, interval, due }
  reviewCount: 0,
  theme: "dark"
});

let state = load();

function load() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) return Object.assign(defaultState(), JSON.parse(raw));
  } catch (e) {}
  return defaultState();
}
function save() { try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {} }

/* Streak: atualiza ao abrir/atividade */
function touchStreak() {
  const t = todayStr();
  if (state.lastActive === t) return;
  const yesterday = new Date(Date.now() - 864e5).toISOString().slice(0, 10);
  if (state.lastActive === yesterday) state.streak += 1;
  else state.streak = 1;
  state.lastActive = t;
  if (state.streak >= 3) awardBadge("streak3", true);
  save();
}

/* ----------------------------- XP / NÍVEIS ------------------------------- */
function levelFromXp(xp) { return Math.floor(xp / 100) + 1; }
function xpIntoLevel(xp) { return xp % 100; }

function addXp(n) {
  const before = levelFromXp(state.xp);
  state.xp += n;
  const after = levelFromXp(state.xp);
  save();
  renderTopBar();
  if (after > before) toast(`🎉 Subiu para o Nível ${after}!`);
}

/* ----------------------------- BADGES ------------------------------------ */
function awardBadge(id, silent) {
  if (state.badges.includes(id)) return;
  state.badges.push(id);
  save();
  const b = BADGES.find(x => x.id === id);
  if (b && !silent) toast(`${b.ico} Conquista: ${b.name}`);
}

/* ----------------------------- SM-2 (repetição espaçada) ----------------- */
/* quality: 0=again, 3=hard, 4=good, 5=easy */
function scheduleCard(id, front, back, quality) {
  let c = state.srs[id] || { ef: 2.5, reps: 0, interval: 0, front, back };
  c.front = front; c.back = back;
  if (quality < 3) {
    c.reps = 0; c.interval = 1;
  } else {
    c.ef = Math.max(1.3, c.ef + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)));
    c.reps += 1;
    if (c.reps === 1) c.interval = 1;
    else if (c.reps === 2) c.interval = 3;
    else c.interval = Math.round(c.interval * c.ef);
  }
  const due = new Date(Date.now() + c.interval * 864e5).toISOString().slice(0, 10);
  c.due = due;
  state.srs[id] = c;
  save();
}

function registerCard(id, front, back) {
  // adiciona um card novo (vence hoje) se ainda não existir
  if (!state.srs[id]) {
    state.srs[id] = { ef: 2.5, reps: 0, interval: 0, front, back, due: todayStr() };
    save();
  }
}

function dueCards() {
  const t = todayStr();
  return Object.entries(state.srs)
    .filter(([id, c]) => c.due <= t)
    .map(([id, c]) => ({ id, ...c }));
}

/* ----------------------------- HELPERS ----------------------------------- */
const app = document.getElementById("app");
const $ = sel => document.querySelector(sel);
let toastTimer;
function toast(msg) {
  const el = $("#toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2600);
}
function shuffle(a) { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
function norm(s) { return (s || "").toLowerCase().trim().normalize("NFD").replace(/[̀-ͯ]/g, ""); }

function moduleProgress(m) {
  const total = m.items.length;
  const done = (state.completed[m.id] || []).length;
  return { done, total, pct: total ? Math.round(done / total * 100) : 0 };
}
function isModuleUnlocked(m) {
  if (m.items.length === 0) return false;                 // ainda não construído
  if ((state.completed[m.id] || []).length > 0) return true; // já iniciado: nunca re-trava
  if (!m.requires) return true;                           // sem pré-requisito
  const reqs = Array.isArray(m.requires) ? m.requires : [m.requires];
  return reqs.every(id => {
    const rm = MODULES.find(x => x.id === id);
    const p = moduleProgress(rm);
    return p.total > 0 && p.done >= p.total;              // pré-requisito 100% concluído
  });
}

/* ----------------------------- RUN DE MÓDULO ----------------------------- */
let run = null; // { module, index, errors }

function startModule(id) {
  const m = MODULES.find(x => x.id === id);
  if (!m || m.items.length === 0) return;
  const doneArr = state.completed[m.id] || [];
  let start = 0;
  // continua do primeiro item não concluído
  for (let i = 0; i < m.items.length; i++) { if (!doneArr.includes(i)) { start = i; break; } if (i === m.items.length - 1) start = 0; }
  run = { module: m, index: start, errors: 0, answeredWrongHere: false };
  renderItem();
}

function runbarHtml() {
  const m = run.module;
  let s = `<div class="runbar">`;
  m.items.forEach((it, i) => {
    let cls = i < run.index ? "done" : (i === run.index ? "cur" : "");
    s += `<div class="seg ${cls}"></div>`;
  });
  return s + `</div>`;
}

function crumbsHtml() {
  return `<div class="crumbs"><a onclick="renderHome()">🏠 Início</a> › <span>${run.module.title}</span> › <span>${run.index + 1}/${run.module.items.length}</span></div>`;
}

function markItemDone() {
  const id = run.module.id;
  state.completed[id] = state.completed[id] || [];
  if (!state.completed[id].includes(run.index)) {
    state.completed[id].push(run.index);
    awardBadge("first-lesson");
  }
  save();
}

function nextItem() {
  markItemDone();
  // registra card de repetição espaçada se houver
  const it = run.module.items[run.index];
  if (it.srs) registerCard(run.module.id + ":" + run.index, it.srs.front, it.srs.back);
  if (it.type === "flashcard") registerCard(run.module.id + ":" + run.index, it.front, it.back);

  if (run.index < run.module.items.length - 1) {
    run.index++;
    renderItem();
  } else {
    finishModule();
  }
}

function finishModule() {
  const m = run.module;
  // garante todos marcados
  state.completed[m.id] = m.items.map((_, i) => i);
  if (m.id === "fundamentos") awardBadge("fundamentos");
  if (m.id === "af2") awardBadge("af2");
  if (m.id === "af3") awardBadge("af3");
  if (m.id === "impacto") awardBadge("trail");
  if (run.errors === 0) awardBadge("perfect");
  save();

  app.innerHTML = `
    ${crumbsHtml()}
    <div class="panel done-screen">
      <div class="trophy">🏆</div>
      <h2>Módulo concluído!</h2>
      <p style="color:var(--text-dim)">${m.title}</p>
      <p class="xp-pop">+${m.items.length * 10} XP</p>
      <p style="color:var(--text-dim);font-size:14px">${run.errors === 0 ? "Perfeito — nenhum erro! 🎯" : "Erros nesta passagem: " + run.errors + ". Os cards de revisão vão te ajudar a fixar."}</p>
      <div class="btn-row" style="justify-content:center">
        <button class="btn" onclick="renderHome()">Voltar à trilha</button>
        ${dueCards().length ? `<button class="btn ghost" onclick="startReview()">Revisar cards (${dueCards().length})</button>` : ""}
      </div>
    </div>`;
  addXp(m.items.length * 10);
  window.scrollTo(0, 0);
}

/* ----------------------------- RENDER POR TIPO --------------------------- */
function renderItem() {
  const it = run.module.items[run.index];
  let body = "";
  switch (it.type) {
    case "lesson": body = renderLesson(it); break;
    case "quiz": body = renderQuiz(it); break;
    case "fill": body = renderFill(it); break;
    case "order": body = renderOrder(it); break;
    case "elaborate": body = renderElaborate(it); break;
    case "flashcard": body = renderFlashLearn(it); break;
    case "diagram": body = renderDiagram(it); break;
    case "plddt": body = renderPlddt(it); break;
  }
  app.innerHTML = crumbsHtml() + runbarHtml() + `<div class="panel">${body}</div>`;
  window.scrollTo(0, 0);
  if (it.type === "order") initDrag();
}

function renderLesson(it) {
  return `<div class="lesson"><h2>${it.title}</h2>${it.html}
    <div class="btn-row"><button class="btn" onclick="nextItem()">Continuar →</button></div></div>`;
}

function renderQuiz(it) {
  const opts = it.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="answerQuiz(this, ${i}, ${it.answer})">${o}</button>`).join("");
  return `<div class="q-text">${it.q}</div>${opts}
    <div class="feedback" id="fb"><b id="fbt"></b><span id="fbw"></span></div>
    <div class="btn-row" id="nextrow" style="display:none"><button class="btn" onclick="nextItem()">Continuar →</button></div>`;
}
function answerQuiz(btn, i, ans) {
  document.querySelectorAll(".opt").forEach(o => o.disabled = true);
  const it = run.module.items[run.index];
  const fb = $("#fb");
  if (i === ans) {
    btn.classList.add("correct");
    fb.className = "feedback show ok"; $("#fbt").textContent = "✅ Correto!";
    addXp(10);
  } else {
    btn.classList.add("wrong");
    document.querySelector(`.opt[data-i="${ans}"]`).classList.add("correct");
    fb.className = "feedback show no"; $("#fbt").textContent = "❌ Não exatamente.";
    run.errors++;
  }
  $("#fbw").textContent = it.why;
  $("#nextrow").style.display = "flex";
}

function renderFill(it) {
  return `<div class="q-text">${it.q}</div>
    <div class="fill">
      <input id="fillin" type="text" placeholder="Digite sua resposta..." autocomplete="off"
        onkeydown="if(event.key==='Enter')checkFill()">
      <div class="hint">💡 ${it.hint}</div>
    </div>
    <div class="feedback" id="fb"><b id="fbt"></b><span id="fbw"></span></div>
    <div class="btn-row"><button class="btn" id="checkbtn" onclick="checkFill()">Verificar</button>
      <button class="btn" id="nextbtn" style="display:none" onclick="nextItem()">Continuar →</button></div>`;
}
function checkFill() {
  const it = run.module.items[run.index];
  const val = norm($("#fillin").value);
  const ok = it.accept.some(a => norm(a) === val);
  const fb = $("#fb");
  $("#fillin").disabled = true;
  $("#checkbtn").style.display = "none";
  $("#nextbtn").style.display = "inline-block";
  if (ok) { fb.className = "feedback show ok"; $("#fbt").textContent = "✅ Correto!"; addXp(10); }
  else { fb.className = "feedback show no"; $("#fbt").textContent = `❌ Resposta esperada: "${it.accept[0]}"`; run.errors++; }
  $("#fbw").textContent = it.why;
}

function renderOrder(it) {
  const shuffled = shuffle(it.items.map((t, i) => ({ t, i })));
  // evita ordem já correta
  const lis = shuffled.map(o =>
    `<li class="order-item" draggable="true" data-i="${o.i}"><span class="grip">⠿</span><span class="num">?</span><span>${o.t}</span></li>`).join("");
  return `<div class="q-text">${it.q}</div>
    <ul class="order-list" id="orderlist">${lis}</ul>
    <div class="feedback" id="fb"><b id="fbt"></b><span id="fbw"></span></div>
    <div class="btn-row"><button class="btn" id="checkbtn" onclick="checkOrder()">Verificar ordem</button>
      <button class="btn" id="nextbtn" style="display:none" onclick="nextItem()">Continuar →</button></div>`;
}
let dragEl = null;
function initDrag() {
  const list = $("#orderlist");
  list.querySelectorAll(".order-item").forEach(li => {
    li.addEventListener("dragstart", () => { dragEl = li; li.classList.add("dragging"); });
    li.addEventListener("dragend", () => { li.classList.remove("dragging"); renumber(); });
  });
  list.addEventListener("dragover", e => {
    e.preventDefault();
    const after = getDragAfter(list, e.clientY);
    if (after == null) list.appendChild(dragEl);
    else list.insertBefore(dragEl, after);
  });
  // suporte a toque: clique move o item para baixo
  list.querySelectorAll(".order-item").forEach(li => {
    li.addEventListener("click", () => {
      const next = li.nextElementSibling;
      if (next) list.insertBefore(next, li); else list.insertBefore(li, list.firstElementChild);
      renumber();
    });
  });
  renumber();
}
function renumber() {
  $("#orderlist").querySelectorAll(".order-item").forEach((li, idx) => {
    li.querySelector(".num").textContent = idx + 1;
  });
}
function getDragAfter(list, y) {
  const els = [...list.querySelectorAll(".order-item:not(.dragging)")];
  return els.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) return { offset, element: child };
    return closest;
  }, { offset: -Infinity }).element || null;
}
function checkOrder() {
  const order = [...$("#orderlist").querySelectorAll(".order-item")].map(li => +li.dataset.i);
  const correct = order.every((v, idx) => v === idx);
  const it = run.module.items[run.index];
  const fb = $("#fb");
  $("#checkbtn").style.display = "none";
  $("#nextbtn").style.display = "inline-block";
  $("#orderlist").querySelectorAll(".order-item").forEach(li => li.style.cursor = "default");
  if (correct) { fb.className = "feedback show ok"; $("#fbt").textContent = "✅ Ordem correta!"; addXp(10); }
  else {
    fb.className = "feedback show no"; $("#fbt").textContent = "❌ Ordem incorreta. A sequência certa é:";
    run.errors++;
    // mostra a correta
    const ol = $("#orderlist"); ol.innerHTML = it.items.map((t, i) =>
      `<li class="order-item" style="cursor:default"><span class="num">${i + 1}</span><span>${t}</span></li>`).join("");
  }
  $("#fbw").textContent = it.why;
}

function renderElaborate(it) {
  return `<div class="q-text">✍️ ${it.q}</div>
    <p class="hint" style="margin-top:-8px">Escreva com suas palavras. Depois compare com a resposta-modelo (autoavaliação — a elaboração ativa fixa o aprendizado).</p>
    <textarea class="elab" id="elab" placeholder="Sua explicação..."></textarea>
    <div class="model-answer" id="model" style="display:none">
      <b>💡 Resposta-modelo:</b><br>${it.model}
    </div>
    <div class="btn-row">
      <button class="btn ghost" id="revealbtn" onclick="revealModel()">Mostrar resposta-modelo</button>
      <button class="btn" id="nextbtn" style="display:none" onclick="nextItem()">Continuar →</button>
    </div>`;
}
function revealModel() {
  if ($("#elab").value.trim().length < 5) { toast("Tente escrever algo primeiro 🙂"); return; }
  $("#model").style.display = "block";
  $("#revealbtn").style.display = "none";
  $("#nextbtn").style.display = "inline-block";
  addXp(10);
}

function renderFlashLearn(it) {
  return `<div class="q-text">🃏 Flashcard</div>
    <p class="hint" style="margin-top:-8px">Tente lembrar a resposta antes de virar. Este card entra na sua revisão espaçada.</p>
    <div class="flash" id="flash" onclick="this.classList.toggle('flipped')">
      <div class="flash-inner">
        <div class="flash-face front"><span class="tag">Pergunta — clique para virar</span><div>${it.front}</div></div>
        <div class="flash-face back"><span class="tag">Resposta</span><div>${it.back}</div></div>
      </div>
    </div>
    <div class="btn-row"><button class="btn" onclick="addXp(5);nextItem()">Entendi, continuar →</button></div>`;
}

function renderDiagram(it) {
  let nodes = "";
  it.nodes.forEach((n, i) => {
    nodes += `<div class="diag-node" onclick="this.classList.toggle('active')">
      <h4>${n.h}</h4><div class="desc">${n.d}</div></div>`;
    if (i < it.nodes.length - 1) nodes += `<div class="diag-arrow">↓</div>`;
  });
  return `<div class="q-text">${it.q}</div>
    <div class="diagram">${nodes}</div>
    <div class="btn-row"><button class="btn" onclick="addXp(10);nextItem()">Continuar →</button></div>`;
}

function renderPlddt(it) {
  // 5 regiões com cores e interpretações
  const regs = [
    { c: "#0053D6", t: "Muito alta (>90)", d: "Região muito confiável — provavelmente um núcleo bem estruturado (ex.: hélice ou folha estável)." },
    { c: "#65CBF3", t: "Confiável (70–90)", d: "Boa confiança. A espinha dorsal está bem prevista, embora detalhes possam variar." },
    { c: "#FFDB13", t: "Baixa (50–70)", d: "Confiança limitada — interprete com cautela." },
    { c: "#FF7D45", t: "Muito baixa (<50)", d: "Pouca confiança. Frequentemente uma região intrinsecamente desordenada, sem forma fixa." },
    { c: "#65CBF3", t: "Confiável (70–90)", d: "Volta a uma região estruturada e confiável." }
  ];
  const segs = regs.map((r, i) =>
    `<div class="plddt-seg" style="background:${r.c}" onmouseover="plddtShow(${i})" onclick="plddtShow(${i})"></div>`).join("");
  return `<div class="q-text">${it.q}</div>
    <div class="plddt-demo">
      <div class="plddt-track">${segs}</div>
      <div class="plddt-readout" id="plddtout">👆 Passe o mouse ou toque numa faixa da "proteína".</div>
      <div class="plddt-legend">
        <span><i style="background:#0053D6"></i>Muito alta</span>
        <span><i style="background:#65CBF3"></i>Confiável</span>
        <span><i style="background:#FFDB13"></i>Baixa</span>
        <span><i style="background:#FF7D45"></i>Muito baixa</span>
      </div>
    </div>
    <p class="hint">Estas são exatamente as faixas de cor que o AlphaFold usa para colorir as estruturas pelo pLDDT.</p>
    <div class="btn-row"><button class="btn" onclick="addXp(10);nextItem()">Continuar →</button></div>`;
}
const PLDDT_REGS = [
  "Muito alta (>90): região muito confiável — provavelmente um núcleo bem estruturado.",
  "Confiável (70–90): boa confiança; a espinha dorsal está bem prevista.",
  "Baixa (50–70): confiança limitada — interprete com cautela.",
  "Muito baixa (<50): pouca confiança; muitas vezes uma região desordenada, sem forma fixa.",
  "Confiável (70–90): de volta a uma região estruturada e confiável."
];
function plddtShow(i) { const el = $("#plddtout"); if (el) el.textContent = PLDDT_REGS[i]; }

/* ----------------------------- REVISÃO (SM-2) ---------------------------- */
let review = null; // { cards: [...], index }
function startReview() {
  const cards = shuffle(dueCards()); // interleaving: mistura cards de módulos diferentes
  if (!cards.length) { toast("Nenhum card para revisar agora 🎉"); renderHome(); return; }
  review = { cards, index: 0 };
  renderReviewCard();
}
function renderReviewCard() {
  const c = review.cards[review.index];
  app.innerHTML = `
    <div class="crumbs"><a onclick="renderHome()">🏠 Início</a> › <span>Revisão espaçada</span> › <span>${review.index + 1}/${review.cards.length}</span></div>
    <div class="runbar">${review.cards.map((_, i) => `<div class="seg ${i < review.index ? "done" : (i === review.index ? "cur" : "")}"></div>`).join("")}</div>
    <div class="panel">
      <div class="q-text">♻️ Recordação ativa</div>
      <p class="hint" style="margin-top:-8px">Tente responder de memória. Depois vire e avalie honestamente — isso calibra quando o card volta.</p>
      <div class="flash" id="flash" onclick="this.classList.toggle('flipped');document.getElementById('srsrow').style.display='flex';">
        <div class="flash-inner">
          <div class="flash-face front"><span class="tag">Pergunta — clique para revelar</span><div>${c.front}</div></div>
          <div class="flash-face back"><span class="tag">Resposta</span><div>${c.back}</div></div>
        </div>
      </div>
      <div class="srs-row" id="srsrow" style="display:none">
        <button class="btn srs-again" onclick="gradeCard(0)">Errei</button>
        <button class="btn srs-hard" onclick="gradeCard(3)">Difícil</button>
        <button class="btn srs-good" onclick="gradeCard(4)">Bom</button>
        <button class="btn srs-easy" onclick="gradeCard(5)">Fácil</button>
      </div>
    </div>`;
  window.scrollTo(0, 0);
}
function gradeCard(q) {
  const c = review.cards[review.index];
  scheduleCard(c.id, c.front, c.back, q);
  state.reviewCount++;
  if (state.reviewCount >= 10) awardBadge("review10");
  if (q >= 3) addXp(5);
  save();
  if (review.index < review.cards.length - 1) { review.index++; renderReviewCard(); }
  else {
    app.innerHTML = `<div class="panel done-screen">
      <div class="trophy">♻️</div><h2>Revisão concluída!</h2>
      <p style="color:var(--text-dim)">Você revisou ${review.cards.length} ${review.cards.length === 1 ? "card" : "cards"}. Cada um voltará no momento ideal para não esquecer.</p>
      <div class="btn-row" style="justify-content:center"><button class="btn" onclick="renderHome()">Voltar</button></div>
    </div>`;
    window.scrollTo(0, 0);
  }
}

  state.theme = state.theme === "light" ? "dark" : "light";

renderTopBar();
